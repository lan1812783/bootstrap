---
- name: Check if there is currently any installation available
  command: nvim -v
  register: nvim_version
  ignore_errors: true
  changed_when: false

- name: Install build prerequisites for Ubuntu
  become: true
  package:
    name:
      - ninja-build
      - gettext
      - cmake
      - unzip
      - curl
  when: nvim_version.rc != 0 and ansible_facts['distribution'] == 'Ubuntu'

- name: Install build prerequisites for MacOS
  package:
    name:
      - ninja
      - cmake
      - gettext
      - curl
  when: (nvim_version.rc != 0 or nvim_force_installation) and ansible_facts['distribution'] == 'MacOSX'

- name: Create a directory for storing repositories
  file:
    path: '{{ dep_dir_path }}'
    state: directory
  when: nvim_version.rc != 0 or nvim_force_installation

- name: Clone the repository
  git:
    repo: https://github.com/neovim/neovim
    dest: '{{ dep_dir_path }}/neovim'
    version: stable
    force: '{{ nvim_force_installation }}'
  when: nvim_version.rc != 0 or nvim_force_installation

- name: Clean up built artifacts
  community.general.make:
    chdir: '{{ dep_dir_path }}/neovim'
    target: distclean
  when: nvim_version.rc != 0 or nvim_force_installation

- name: Build the stable release
  community.general.make:
    chdir: '{{ dep_dir_path }}/neovim'
    jobs: 4
    params:
      CMAKE_BUILD_TYPE: RelWithDebInfo
  when: nvim_version.rc != 0 or nvim_force_installation

- name: Install the binary
  become: true
  community.general.make:
    chdir: '{{ dep_dir_path }}/neovim'
    target: install
  when: nvim_version.rc != 0 or nvim_force_installation

- name: Install plugins' dependencies
  become: "{{ false if ansible_facts['distribution'] == 'MacOSX' else true }}"
  package:
    name:
      - ripgrep
  when: nvim_version.rc != 0 or nvim_force_installation
