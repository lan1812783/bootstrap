---
- name: Bootstrap enviroment
  hosts: personal_environment
  connection: local
  pre_tasks:
    - name: Update cache
      become: true
      package:
        update_cache: true
      when: ansible_facts['distribution'] == 'Ubuntu'
  tasks:
    - name: Package
      tags: package
      import_role:
        name: package

    - name: Font
      tags: font
      import_role:
        name: font

    - name: Neovim
      tags: neovim
      import_role:
        name: neovim

    - name: Ghostty
      tags: ghostty
      import_role:
        name: ghostty

    - name: Dotfiles
      tags: dotfiles
      import_role:
        name: dotfiles

    - name: Node
      tags: node
      import_role:
        name: node

    - name: SDKMAN!
      tags: sdkman
      import_role:
        name: sdkman

    - name: Starship
      tags: starship
      import_role:
        name: starship

    - name: Google style guide
      tags: googlestyleguide
      import_role:
        name: googlestyleguide

    - name: Desktop
      tags: desktop
      import_role:
        name: desktop
